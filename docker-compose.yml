services:
  web:
    build:
      context: .
      args:
        BUNDLE_WITHOUT: ""   # include development gems
    environment:
      RAILS_ENV: development
      BUNDLE_WITHOUT: ""
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: volun_peers_development
      REDISCLOUD_URL: redis://redis:6379/1
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      MAPBOX_API_KEY: ${MAPBOX_API_KEY}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      RAILS_MAX_THREADS: "5"
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: volun_peers_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  bundle:
